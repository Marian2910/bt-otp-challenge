name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      # ---------- CHECKOUT ----------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------- SETUP .NET ----------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ---------- SETUP NODE ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ---------- FRONTEND INSTALL ----------
      - name: Install frontend dependencies
        working-directory: ./bt-otp-frontend
        run: npm install

      # ---------- FRONTEND TESTS + COVERAGE ----------
      - name: Run frontend tests (with coverage)
        working-directory: ./bt-otp-frontend
        run: npm run test:ci

      # ---------- INSTALL SONAR SCANNER ----------
      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      # ---------- BEGIN SONAR ----------
      - name: SonarCloud Begin
        run: |
          dotnet sonarscanner begin \
            /k:"Marian2910_bt-otp-challenge" \
            /o:"marian2910" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.cobertura.reportsPaths="coverage.xml" \
            /d:sonar.javascript.lcov.reportPaths="bt-otp-frontend/coverage/lcov.info"

      # ---------- BUILD BACKEND ----------
      - name: Build .NET
        run: dotnet build --no-incremental

      # ---------- BACKEND TESTS + COVERAGE ----------
      - name: Test .NET with coverage
        run: |
          dotnet test \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      # ---------- PREPARE COVERAGE ----------
      - name: Prepare coverage file
        run: |
          cp $(find . -name "coverage.cobertura.xml" | head -n 1) coverage.xml

      # ---------- END SONAR ----------
      - name: SonarCloud End
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
