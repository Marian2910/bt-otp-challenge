name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------- .NET SETUP ----------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ---------- NODE (React) ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ---------- Install frontend deps ----------
      - name: Install frontend dependencies
        working-directory: ./bt-otp-frontend
        run: npm install

      # ---------- Build frontend ----------
      - name: Build frontend
        working-directory: ./bt-otp-frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: ./bt-otp-frontend
        run: npm test -- --coverage

      # ---------- Install SonarScanner ----------
      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      # ---------- Add tool to PATH ----------
      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      # ---------- BEGIN SONAR ----------
      - name: SonarCloud Begin
        run: |
          dotnet sonarscanner begin \
            /k:"Marian2910_bt-otp-challenge" \
            /o:"marian2910" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.cobertura.reportsPaths="coverage.xml"
            /d:sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

      # ---------- BUILD ----------
      - name: Build .NET
        run: dotnet build --no-incremental

      # ---------- TEST + COVERAGE ----------
      - name: Test with coverage
        run: |
          dotnet test \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      # ---------- MERGE COVERAGE ----------
      - name: Prepare coverage file
        run: |
          cp **/TestResults/*/coverage.cobertura.xml coverage.xml

      # ---------- END SONAR ----------
      - name: SonarCloud End
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
